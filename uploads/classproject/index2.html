<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page For Book Order</title>
    <style>
       .img1{
        width:100vw;
        height:100vh;
        object-fit:fill;
        opacity:0.15;
        position: fixed;
       }
       .nav1{
        display: flex;
       }
       img{
        width:100px;
        height:100px;
        border-radius: 10%;
       }
       h2{
        margin-left: auto;
        margin-right: auto;
        margin-top:0px;
       }
       ul{
        list-style-type: none;
        display:flex;
        justify-content:space-between;
        font-size: 20px;
        position:relative;
       }

       a{
        color:blueviolet;
        text-decoration-line: none;
       }
       .ul1{
        margin-top: 100px;
         display:flex;
         flex-direction: column;
         row-gap: 10vh;
         float: left;
       }
       .nav2{
        display:flow-root;
       }
       p{
        margin-top: 100px;
        font-size: larger;
       }
       a:hover{
       
        color:blue;
       }
       #nav4{
        position: relative;
        z-index: 1;
        margin-top: 20vh;
        margin-left: 50vw;
       }
       #button1{
        margin-top: 20px;
        margin-right: 50px;
       }
       #Password{
        margin-top: 20px;
       }
       #div6{
        margin-bottom: 10px;
       }
    </style>
</head>
<body>
    <div class="div1">
        <img class="img1"src="image.png" alt="">
        <nav class="nav1">
            <img src="image.png" alt="">
            <h2>Kiet Book Store</h2>
        </nav>
        <nav>
            <ul>
                <li><a href="https://www.google.com/">Home</a></li>
                <li><a href="">Login</a></li>
                <li><a href="">Registration</a></li>
                <li><a href="">Catalogue</a></li>
                <li><a href="">Cart</a></li>
            </ul>
        </nav>
        <nav class="nav2">
            <ul class="ul1">
                <li><a href="">CSE</a></li>
                <li><a href="">ECE</a></li>
                <li><a href="">Civil</a></li>
                <li><a href="">Mechanical</a></li>
            </ul>
            <nav id="nav4">
                <div id="div6">Login page</div>
                <span id="username">Username</span>
                <input type="text" id="usermane" placeholder="username">
                <div>
                <span id="password">Password</span>
                <input type="text" id="Password" placeholder="password">
                </div>
                <button id="button1">Submit</button>
                <button>Reset</button>
            </nav>
        </nav>

    </div>
</body>
</html>
